name: pl-timetable-team-db

services:
  db:
    image: postgres:18.4-alpine
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-pl_timetable}
      POSTGRES_USER: ${POSTGRES_USER:-pl_timetable}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-local-only-change-me}
    ports:
      - "127.0.0.1:${POSTGRES_PORT:-15432}:5432"
    volumes:
      # PostgreSQL 18 keeps the cluster in a version-specific subdirectory.
      - postgres_data:/var/lib/postgresql
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-pl_timetable} -d ${POSTGRES_DB:-pl_timetable}"]
      interval: 3s
      timeout: 3s
      retries: 20
    restart: unless-stopped

  migrate:
    image: flyway/flyway:12.11.0-alpine
    command: migrate
    environment:
      FLYWAY_URL: jdbc:postgresql://db:5432/${POSTGRES_DB:-pl_timetable}
      FLYWAY_USER: ${POSTGRES_USER:-pl_timetable}
      FLYWAY_PASSWORD: ${POSTGRES_PASSWORD:-local-only-change-me}
      FLYWAY_LOCATIONS: filesystem:/flyway/sql
      FLYWAY_CONNECT_RETRIES: 60
    volumes:
      - ./backend/src/main/resources/db/migration:/flyway/sql:ro
    depends_on:
      db:
        condition: service_healthy
    restart: "no"

  ingest:
    image: postgres:18.4-alpine
    environment:
      PGHOST: db
      PGPORT: 5432
      PGDATABASE: ${POSTGRES_DB:-pl_timetable}
      PGUSER: ${POSTGRES_USER:-pl_timetable}
      PGPASSWORD: ${POSTGRES_PASSWORD:-local-only-change-me}
      DATA_DIR: /workspace/data/database
      NORMALIZATION_SQL: /workspace/normalization/normalize_academic_units.sql
    entrypoint: ["/bin/sh", "/workspace/scripts/ingest-academic-data.sh"]
    volumes:
      - ./data/database:/workspace/data/database:ro
      - ./backend/src/main/resources/db/normalization:/workspace/normalization:ro
      - ./scripts:/workspace/scripts:ro
    depends_on:
      migrate:
        condition: service_completed_successfully
    restart: "no"

  api:
    build:
      context: ./backend
      dockerfile: Dockerfile
      args:
        APP_VERSION: ${APP_VERSION:-0.0.1-SNAPSHOT}
        APP_COMMIT: ${APP_COMMIT:-unknown}
    image: pl-timetable-team-api:${APP_IMAGE_TAG:-local}
    environment:
      SPRING_PROFILES_ACTIVE: ${SPRING_PROFILES_ACTIVE:-prod}
      SERVER_PORT: 8080
      SERVER_ADDRESS: 0.0.0.0
      SERVER_FORWARD_HEADERS_STRATEGY: ${SERVER_FORWARD_HEADERS_STRATEGY:-framework}
      DATABASE_URL: jdbc:postgresql://db:5432/${POSTGRES_DB:-pl_timetable}
      DATABASE_USERNAME: ${POSTGRES_USER:-pl_timetable}
      DATABASE_PASSWORD: ${POSTGRES_PASSWORD:-local-only-change-me}
      APP_VERSION: ${APP_VERSION:-0.0.1-SNAPSHOT}
      APP_COMMIT: ${APP_COMMIT:-unknown}
      SCHOOL_EMAIL_DOMAIN: ${SCHOOL_EMAIL_DOMAIN:-daejin.ac.kr}
      OTP_EXPIRATION_SECONDS: ${OTP_EXPIRATION_SECONDS:-300}
      OTP_COOLDOWN_SECONDS: ${OTP_COOLDOWN_SECONDS:-60}
      OTP_MAX_ATTEMPTS: ${OTP_MAX_ATTEMPTS:-5}
      OTP_DELIVERY: ${OTP_DELIVERY:-console}
      OTP_FROM: ${OTP_FROM:-}
      SMTP_HOST: ${SMTP_HOST:-localhost}
      SMTP_PORT: ${SMTP_PORT:-587}
      SMTP_USERNAME: ${SMTP_USERNAME:-}
      SMTP_PASSWORD: ${SMTP_PASSWORD:-}
      SMTP_AUTH: ${SMTP_AUTH:-true}
      SMTP_STARTTLS: ${SMTP_STARTTLS:-true}
      ALLOWED_ORIGINS: ${ALLOWED_ORIGINS:-http://localhost:5173}
      SESSION_COOKIE_SECURE: ${SESSION_COOKIE_SECURE:-true}
      SESSION_COOKIE_SAME_SITE: ${SESSION_COOKIE_SAME_SITE:-lax}
      OPENAPI_ENABLED: ${OPENAPI_ENABLED:-true}
    ports:
      - "${API_BIND_ADDRESS:-127.0.0.1}:${API_PORT:-18082}:8080"
    depends_on:
      db:
        condition: service_healthy
      migrate:
        condition: service_completed_successfully
      ingest:
        condition: service_completed_successfully
    healthcheck:
      test:
        - CMD
        - curl
        - --fail
        - --silent
        - --show-error
        - http://127.0.0.1:8080/api/v1/health/live
      interval: 15s
      timeout: 5s
      start_period: 40s
      retries: 5
    restart: unless-stopped
    init: true
    read_only: true
    tmpfs:
      - /tmp:rw,nosuid,size=256m
    cap_drop:
      - ALL
    security_opt:
      - no-new-privileges:true
    stop_grace_period: 30s
    logging:
      driver: json-file
      options:
        max-size: 10m
        max-file: "5"

volumes:
  postgres_data:
