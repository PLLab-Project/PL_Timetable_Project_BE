spring.application.name=PL_Timetable_project

spring.datasource.url=${DATABASE_URL:jdbc:postgresql://localhost:15432/pl_timetable}
spring.datasource.username=${DATABASE_USERNAME:pl_timetable}
spring.datasource.password=${DATABASE_PASSWORD:local-only-change-me}

spring.flyway.enabled=true
spring.flyway.locations=classpath:db/migration
spring.jpa.hibernate.ddl-auto=validate
spring.jpa.open-in-view=false
spring.jpa.properties.hibernate.jdbc.time_zone=UTC

# OTP 인증 설정은 환경 변수로 교체할 수 있습니다. 콘솔 전송은 로컬 개발 전용입니다.
app.auth.school-email-domain=${SCHOOL_EMAIL_DOMAIN:daejin.ac.kr}
app.auth.otp.expiration-seconds=${OTP_EXPIRATION_SECONDS:300}
app.auth.otp.cooldown-seconds=${OTP_COOLDOWN_SECONDS:60}
app.auth.otp.max-attempts=${OTP_MAX_ATTEMPTS:5}
app.auth.otp.delivery=${OTP_DELIVERY:console}
app.auth.otp.from=${OTP_FROM:${SMTP_USERNAME:}}

# 쉼표로 구분한 프론트엔드 주소만 세션 쿠키를 포함해 API를 호출할 수 있습니다.
app.security.allowed-origins=${ALLOWED_ORIGINS:http://localhost:5173}

# OTP_DELIVERY=smtp일 때 사용하는 메일 서버 설정입니다.
spring.mail.host=${SMTP_HOST:localhost}
spring.mail.port=${SMTP_PORT:587}
spring.mail.username=${SMTP_USERNAME:}
spring.mail.password=${SMTP_PASSWORD:}
spring.mail.properties.mail.smtp.auth=${SMTP_AUTH:true}
spring.mail.properties.mail.smtp.starttls.enable=${SMTP_STARTTLS:true}

# 세션 쿠키는 JavaScript에서 읽지 못하게 하고, 동일 사이트 요청에만 전송합니다.
server.servlet.session.cookie.http-only=true
server.servlet.session.cookie.same-site=lax
server.servlet.session.cookie.secure=${SESSION_COOKIE_SECURE:false}
server.servlet.session.timeout=30m
